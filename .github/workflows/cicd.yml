name: CI/CD Pipeline

on:
  push:
    branches:
      - ngwpc-candidate
      - ngwpc-release
      - master
      - nwm-master
      - development
      - release-candidate
  pull_request:
    branches:
      - ngwpc-candidate
      - ngwpc-release
      - main
      - nwm-master
      - development
      - release-candidate
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Select which image(s) to build'
        required: true
        default: 'All'
        type: choice
        options:
          - All
          - Coastal
          - SFINCS
      COASTAL_BASE_TAG:
        description: 'COASTAL_BASE_TAG'
        required: false
        type: string
      SFINCS_BASE_TAG:
        description: 'SFINCS_BASE_TAG'
        required: false
        type: string
      EWTS_ORG:
        description: 'EWTS_ORG'
        required: false
        type: string
      EWTS_REF:
        description: 'EWTS_REF'
        required: false
        type: string
      NGEN_ORG:
        description: 'NGEN_ORG'
        required: false
        type: string
      NGEN_REF:
        description: 'NGEN_REF'
        required: false
        type: string
      TROUTE_ORG:
        description: 'TROUTE_ORG'
        required: false
        type: string
      TROUTE_REF:
        description: 'TROUTE_REF'
        required: false
        type: string
      NGEN_FORCING_ORG:
        description: 'NGEN_FORCING_ORG'
        required: false
        type: string
      NGEN_FORCING_REF:
        description: 'NGEN_FORCING_REF'
        required: false
        type: string

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  COASTAL_BASE_REPO: rockylinux
  SFINCS_BASE_REPO: deltares/sfincs-cpu

jobs:
  # set variables for use in other jobs
  setup:
    runs-on: ubuntu-latest
    outputs:
      org: ${{ steps.vars.outputs.org }}
      coastal_image: ${{ steps.vars.outputs.coastal_image }}
      coastal_base_name: ${{ steps.vars.outputs.coastal_base_name }}
      coastal_base_tag: ${{ steps.vars.outputs.coastal_base_tag }}
      coastal_base_digest: ${{ steps.vars.outputs.coastal_base_digest }}
      coastal_base_revision: ${{ steps.vars.outputs.coastal_base_revision }}
      sfincs_image: ${{ steps.vars.outputs.sfincs_image }}
      sfincs_base_name: ${{ steps.vars.outputs.sfincs_base_name }}
      sfincs_base_tag: ${{ steps.vars.outputs.sfincs_base_tag }}
      sfincs_base_digest: ${{ steps.vars.outputs.sfincs_base_digest }}
      sfincs_base_revision: ${{ steps.vars.outputs.sfincs_base_revision }}
      commit_sha: ${{ steps.vars.outputs.commit_sha }}
      commit_sha_short: ${{ steps.vars.outputs.commit_sha_short }}
      test_image_tag: ${{ steps.vars.outputs.test_image_tag }}
      alias_tag: ${{ steps.vars.outputs.alias_tag }}
      clean_ref: ${{ steps.vars.outputs.clean_ref }}
    steps:
      - name: Compute image vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          # set variables to use with Docker images
          ORG="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(basename "${GITHUB_REPOSITORY}")"
          IMAGE_BASE="${REGISTRY}/${ORG}"

          # one datetime for all time variables
          NOW=$(date -u +'%Y-%m-%d %H:%M:%S')

          # for Docker image tags
          TIMESTAMP=$(date -u -d "$NOW" +'%Y%m%d%H%M%SZ')

          # logic to get the real branch name and commit SHA on pull requests
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            REAL_REF="${{ github.head_ref }}"
            REAL_SHA="${{ github.event.pull_request.head.sha }}"
          else
            REAL_REF="${{ github.ref_name }}"
            REAL_SHA="${GITHUB_SHA}"
          fi

          # clean ref name and short commit sha
          CLEAN_REF=$(echo "$REAL_REF" | tr '[:upper:]' '[:lower:]' | sed 's/\//-/g')
          SHORT_SHA="${REAL_SHA:0:7}"

          # skopeo is needed to inspect the base image
          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends skopeo
          fi

          # base image metadata for Coastal Dockerfile labels
          COASTAL_BASE_TAG_INPUT="${{ github.event.inputs.COASTAL_BASE_TAG || '' }}"
          if [ -n "$COASTAL_BASE_TAG_INPUT" ]; then
            COASTAL_BASE_TAG="$COASTAL_BASE_TAG_INPUT"
          else
            COASTAL_BASE_TAG="8"
          fi
          COASTAL_BASE_NAME="${COASTAL_BASE_REPO}:${COASTAL_BASE_TAG}"
          COASTAL_BASE_INSPECT=$(skopeo inspect "docker://${COASTAL_BASE_NAME}")
          COASTAL_BASE_DIGEST=$(echo "$COASTAL_BASE_INSPECT" | jq -r '.Digest // "unknown"')
          COASTAL_BASE_REVISION=$(echo "$COASTAL_BASE_INSPECT" | jq -r '.Labels["org.opencontainers.image.revision"] // .Labels["io.ngwpc.image.base.revision"] // "unknown"')

          # base image metadata for SFINCS Dockerfile labels
          SFINCS_BASE_TAG_INPUT="${{ github.event.inputs.SFINCS_BASE_TAG || '' }}"
          if [ -n "$SFINCS_BASE_TAG_INPUT" ]; then
            SFINCS_BASE_TAG="$SFINCS_BASE_TAG_INPUT"
          else
            SFINCS_BASE_TAG="latest"
          fi
          SFINCS_BASE_NAME="${SFINCS_BASE_REPO}:${SFINCS_BASE_TAG}"
          SFINCS_BASE_INSPECT=$(skopeo inspect "docker://${SFINCS_BASE_NAME}")
          SFINCS_BASE_DIGEST=$(echo "$SFINCS_BASE_INSPECT" | jq -r '.Digest // "unknown"')
          SFINCS_BASE_REVISION=$(echo "$SFINCS_BASE_INSPECT" | jq -r '.Labels["org.opencontainers.image.revision"] // .Labels["io.ngwpc.image.base.revision"] // "unknown"')

          # logic for the tags:
          # test_image_tag (commit short sha): used for the initial build and test
          # alias_tag: used for final tagging on successful tests

          # test tag is always commit short sha
          TEST_TAG="${SHORT_SHA}"

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            # for pull requests, use pr-<pr number>-build
            ALIAS="pr-${{ github.event.pull_request.number }}-build"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            # for workflow dispatches on tags, use the git tag
            ALIAS="${CLEAN_REF}"
          else
            # for pushes or workflow dispatches to branches, use <timestamp-branchname>
            ALIAS="${TIMESTAMP}-${CLEAN_REF}"
          fi

          # save outputs
          echo "org=${ORG}" >> "$GITHUB_OUTPUT"
          echo "coastal_image=${IMAGE_BASE}/ngen-coastal" >> "$GITHUB_OUTPUT"
          echo "coastal_base_name=${COASTAL_BASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "coastal_base_tag=${COASTAL_BASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "coastal_base_digest=${COASTAL_BASE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "coastal_base_revision=${COASTAL_BASE_REVISION}" >> "$GITHUB_OUTPUT"
          echo "sfincs_image=${IMAGE_BASE}/ngen-sfincs-forcing" >> "$GITHUB_OUTPUT"
          echo "sfincs_base_name=${SFINCS_BASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sfincs_base_tag=${SFINCS_BASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sfincs_base_digest=${SFINCS_BASE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "sfincs_base_revision=${SFINCS_BASE_REVISION}" >> "$GITHUB_OUTPUT"
          echo "test_image_tag=${TEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "alias_tag=${ALIAS}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${REAL_SHA}" >> "$GITHUB_OUTPUT"
          echo "commit_sha_short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "clean_ref=${CLEAN_REF}" >> "$GITHUB_OUTPUT"

  # CodeQL scan
  codeql-scan:
    name: codeql-scan
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # build ngen-coastal image
  pipeline-coastal:
    name: pipeline-coastal
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.build_target == 'All' || inputs.build_target == 'Coastal'))
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      coastal_digest: ${{ steps.build_coastal.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push Coastal
        id: build_coastal # to capture Docker image digest
        uses: docker/build-push-action@v6
        with:
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: ./legacy-coastal
          file: legacy-coastal/Dockerfile.ngencoastal
          push: true
          tags: ${{ needs.setup.outputs.coastal_image }}:${{ needs.setup.outputs.test_image_tag }}
          build-args: |
            COASTAL_BASE_TAG=${{ needs.setup.outputs.coastal_base_tag }}
            COASTAL_BASE_DIGEST=${{ needs.setup.outputs.coastal_base_digest }}
            COASTAL_BASE_REVISION=${{ needs.setup.outputs.coastal_base_revision }}
            EWTS_ORG=${{ inputs.EWTS_ORG || 'NGWPC' }}
            EWTS_REF=${{ inputs.EWTS_REF || 'development' }}
            NGEN_ORG=${{ inputs.NGEN_ORG || 'NGWPC' }}
            NGEN_REF=${{ inputs.NGEN_REF || 'development' }}
            TROUTE_ORG=${{ inputs.TROUTE_ORG || 'NGWPC' }}
            TROUTE_REF=${{ inputs.TROUTE_REF || 'development' }}
            NGEN_FORCING_ORG=${{ inputs.NGEN_FORCING_ORG || 'NGWPC' }}
            NGEN_FORCING_REF=${{ inputs.NGEN_FORCING_REF || 'development' }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            IMAGE_VENDOR=${{ github.repository_owner }}
            IMAGE_VERSION=${{ needs.setup.outputs.clean_ref }}
            IMAGE_REVISION=${{ needs.setup.outputs.commit_sha }}
            CI_COMMIT_REF_NAME=${{ needs.setup.outputs.clean_ref }}
      - name: Free disk space
        run: |
          # clear pre-installed tools
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          # clear Docker build cache only
          # This removes intermediate layers but keeps the final coastal image
          docker builder prune -af

          # remove dangling images only
          docker image prune -f

          # check space
          df -h
      - name: Unit Test Coastal
        run: |
          docker run --rm ${{ needs.setup.outputs.coastal_image }}:${{ needs.setup.outputs.test_image_tag }} \
          echo "Running Coastal Unit Tests..."
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          cache: true
          version: v0.69.3
      - name: Trivy scan (Coastal)
        env:
          TMPDIR: /mnt/trivy-temp
        run: |
          sudo mkdir -p $TMPDIR
          sudo chown -R $USER:$USER $TMPDIR

          trivy image \
            --format sarif \
            --output trivy-results-coastal.sarif \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignore-unfixed \
            --timeout 45m \
            ${{ needs.setup.outputs.coastal_image }}:${{ needs.setup.outputs.test_image_tag }}
      - name: promote tags (alias and latest)
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          # ensure skopeo is available for promotion
          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends skopeo
          fi

          IMAGE_BASE="${{ needs.setup.outputs.coastal_image }}"
          TEST_TAG="${{ needs.setup.outputs.test_image_tag }}"
          ALIAS_TAG="${{ needs.setup.outputs.alias_tag }}"

          # apply the primary alias (pr tag or timestamp-branch)
          skopeo copy \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --all \
            "docker://${IMAGE_BASE}:${TEST_TAG}" "docker://${IMAGE_BASE}:${ALIAS_TAG}"

          # tag with 'latest' if on development branch
          if [ "$GITHUB_REF_NAME" = "development" ]; then
            skopeo copy \
              --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --all \
              "docker://${IMAGE_BASE}:${TEST_TAG}" "docker://${IMAGE_BASE}:latest"
          fi

  # build ngen-sfincs-forcing image
  pipeline-sfincs:
    name: pipeline-sfincs
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.build_target == 'All' || inputs.build_target == 'SFINCS'))
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      sfincs_digest: ${{ steps.build_sfincs.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push SFINCS
        id: build_sfincs # to capture Docker image digest
        uses: docker/build-push-action@v6
        with:
          load: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: ./legacy-coastal
          file: legacy-coastal/Dockerfile.sfincs
          push: true
          tags: ${{ needs.setup.outputs.sfincs_image }}:${{ needs.setup.outputs.test_image_tag }}
          build-args: |
            SFINCS_BASE_DIGEST=${{ needs.setup.outputs.sfincs_base_digest }}
            SFINCS_BASE_REVISION=${{ needs.setup.outputs.sfincs_base_revision }}
            SFINCS_BASE_TAG=${{ needs.setup.outputs.sfincs_base_tag }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            IMAGE_VENDOR=${{ github.repository_owner }}
            IMAGE_VERSION=${{ needs.setup.outputs.clean_ref }}
            IMAGE_REVISION=${{ needs.setup.outputs.commit_sha }}
      - name: Free disk space
        run: |
          # clear pre-installed tools
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          # clear Docker build cache only
          # This removes intermediate layers but keeps the final sfincs image
          docker builder prune -af

          # remove dangling images only
          docker image prune -f

          # check space
          df -h
      - name: Unit Test SFINCS
        run: |
          docker run --rm ${{ needs.setup.outputs.sfincs_image }}:${{ needs.setup.outputs.test_image_tag }} \
          echo "Running SFINCS Unit Tests..."
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          cache: true
          version: v0.69.3
      - name: Trivy scan (SFINCS)
        env:
          TMPDIR: /mnt/trivy-temp
        run: |
          sudo mkdir -p $TMPDIR
          sudo chown -R $USER:$USER $TMPDIR

          trivy image \
            --format sarif \
            --output trivy-results-sfincs.sarif \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignore-unfixed \
            --timeout 45m \
            ${{ needs.setup.outputs.sfincs_image }}:${{ needs.setup.outputs.test_image_tag }}
      - name: promote tags (alias and latest)
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          # ensure skopeo is available for promotion
          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends skopeo
          fi

          IMAGE_BASE="${{ needs.setup.outputs.sfincs_image }}"
          TEST_TAG="${{ needs.setup.outputs.test_image_tag }}"
          ALIAS_TAG="${{ needs.setup.outputs.alias_tag }}"

          # apply the primary alias (pr tag or timestamp-branch)
          skopeo copy \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --all \
            "docker://${IMAGE_BASE}:${TEST_TAG}" "docker://${IMAGE_BASE}:${ALIAS_TAG}"

          # tag with 'latest' if on development branch
          if [ "$GITHUB_REF_NAME" = "development" ]; then
            skopeo copy \
              --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --all \
              "docker://${IMAGE_BASE}:${TEST_TAG}" "docker://${IMAGE_BASE}:latest"
          fi
