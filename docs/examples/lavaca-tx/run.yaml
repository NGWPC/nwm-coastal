# Lavaca Bay, Texas — SFINCS run pipeline configuration
#
# Uses the model created via:
#   coastal-calibration create create.yaml
#
# Quadtree mesh, EPSG:32614 (UTM zone 14N), 512 m base resolution
#
# Usage:
#   coastal-calibration run run.yaml
#   coastal-calibration run run.yaml --stop-after sfincs_write
#   coastal-calibration run run.yaml --start-from sfincs_run

model: sfincs

simulation:
  start_date: 2025-06-01
  duration_hours: 10
  coastal_domain: atlgulf
  meteo_source: nwm_ana  # nwm_retro ends 2023 and stofs starts from 2021

boundary:
  source: stofs

paths:
  work_dir: ./run
  raw_download_dir: ../downloads    # shared download cache

download:
  enabled: true

model_config:
  prebuilt_dir: ./output            # created by: coastal-calibration create create.yaml
  # discharge_locations_file: ./output/sfincs_nwm.src
  merge_discharge: true
  forcing_to_mesh_offset_m: 0.0    # STOFS already in NAVD88
  vdatum_mesh_to_msl_m: 0.30       # NAVD88 mesh -> MSL (0.17 datum + ~0.13 model bias correction)
  include_precip: true
  include_wind: true
  include_pressure: true
  # SFINCS executable path — only needed to override the default PATH lookup.
  # When running inside a pixi environment with the sfincs feature, the binary
  # is compiled automatically and available on PATH.
  # sfincs_exe: ~/.local/bin/sfincs
  # Flood depth map — reuse the NOAA 3 m DEM fetched during model creation.
  # The sfincs_floodmap stage downscales zsmax onto this DEM to produce a
  # Cloud Optimized GeoTIFF of maximum flood depth.
  floodmap_dem: ../downloads/lavaca_grid/noaa_3m.tif
  inp_overrides:
    tspinup: 10800            # 3 h spin-up
    advection: 0              # disable momentum advection
    viscosity: 0              # disable SFINCS built-in viscosity model
    nuvisc: 0.01              # explicit horizontal viscosity (m^2/s)
    cdnrb: 3                  # number of wind-drag breakpoints
    cdwnd: [0.0, 28.0, 50.0]  # wind speed breakpoints (m/s)
    cdval: [0.001, 0.0025, 0.0025]  # drag coefficient at each breakpoint
