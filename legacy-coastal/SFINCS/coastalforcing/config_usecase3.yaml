# -----------------------------------------------------------------------------
# User Configuration File for Coastal Forcing
#
# This file controls model type, hydrology source, meteo source, 
# coastal water level source, domain selection, and output paths.
# -----------------------------------------------------------------------------
coastal_model: sfincs                   # Options: sfincs (schism not implemented)
meteo_source: nwm_ana                   # Options: nwm_retro, nwm_ana
hydrology_source: nwm                   # Options: nwm, ngen
coastal_water_level_source: stofs       # Options: stofs, tpxo, glofs (great lakes only)
domain_file: /sfincs-data/FORCING/Testing/coastalforcing/domain_lists/sfincs/texas_example.yaml              # Options: see domain_lists/{coastal_model}/

start_time: 2025-05-11T00-00-00Z        # Simulation start time in format YYYY-MM-DDTHH-MM-SSZ
end_time: 2025-05-15T00-00-00Z          # Simulation end time in format YYYY-MM-DDTHH-MM-SSZ
output_timestep: 3600.0                 # Output time step

raw_download_dir: /sfincs-data/FORCING/Testing/data/raw/             # Directory for storing raw downloaded data
sim_dir: /sfincs-data/FORCING/Testing/run/                        # Directory for storing all processed model files ready to run

